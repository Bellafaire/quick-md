<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ notebook_title }}{% endblock %}</title>
    
    <!-- MathJax Configuration -->
    <script>
    MathJax = {
        tex: {
            inlineMath: [['$', '$']],
            displayMath: [['$$', '$$']],
            processEscapes: true,
            processEnvironments: true
        },
        options: {
            skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
        }
    };
    </script>
    <script src="/static/js/mathjax-tex-svg.js" id="MathJax-script" async></script>
    
    <style>
        /* ---- Theme: 60/30/10 (base / surface / accent) ----
           Configured in .qmd_conf under `theme:`; all other colors are
           derived in utils/theme.py so any palette stays readable. */
        :root {
            --c-base: {{ theme.base }};
            --c-surface: {{ theme.surface }};
            --c-accent: {{ theme.accent }};
            --c-text: {{ theme.text }};             /* on surface */
            --c-text-on-base: {{ theme.text_on_base }};
            --c-text-on-accent: {{ theme.text_on_accent }};
            --c-muted: {{ theme.muted }};           /* on surface */
            --c-border: {{ theme.border }};         /* on surface */
            --c-accent-hover: {{ theme.accent_hover }};
            /* editor chrome */
            --c-active-line: {{ theme.active_line }};
            --c-selection: {{ theme.selection }};
            --c-gutter: {{ theme.gutter_text }};
            /* semantic status colors (fixed, work on light + dark) */
            --c-ok: #2e8b57;
            --c-ok-bg: rgba(46, 139, 87, 0.14);
            --c-ok-border: rgba(46, 139, 87, 0.35);
            --c-err: #d65a5a;
            --c-err-bg: rgba(214, 90, 90, 0.14);
            --c-err-border: rgba(214, 90, 90, 0.35);
            --c-warn: #e08a2e;
            --c-warn-bg: rgba(224, 138, 46, 0.14);
            --c-warn-border: rgba(224, 138, 46, 0.35);
            --content-width: 1200px;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: var(--c-text-on-base);
            background: var(--c-base);
        }

        /* ---- Nav (surface, 30%) ---- */
        nav {
            background: var(--c-surface);
            color: var(--c-text);
            padding: 1rem;
            border-bottom: 1px solid var(--c-border);
        }

        nav h1 {
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
            color: var(--c-text);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        nav a {
            color: var(--c-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--c-accent);
        }

        .nav-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-controls label {
            margin: 0;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--c-muted);
        }

        .nav-controls select {
            width: auto;
            margin: 0;
            padding: 0.25rem 0.5rem;
            font-size: 0.85rem;
            border-radius: 4px;
            border: 1px solid var(--c-border);
            background: var(--c-base);
            color: var(--c-text-on-base);
            cursor: pointer;
        }

        .nav-controls input[type="checkbox"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .nav-controls .vim-nav-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--c-muted);
            cursor: pointer;
            user-select: none;
        }

        .nav-search {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            margin-right: 0.25rem;
        }

        .nav-search input[type="search"] {
            width: 10rem;
            margin: 0;
            padding: 0.25rem 0.5rem;
            font-size: 0.85rem;
            border-radius: 4px;
            border: 1px solid var(--c-border);
            background: var(--c-base);
            color: var(--c-text-on-base);
        }

        .nav-search button {
            padding: 0.25rem 0.6rem;
            font-size: 0.85rem;
        }

        .container {
            max-width: var(--content-width);
            margin: 1rem auto;
            padding: 0 1rem;
        }

        /* ---- Cards / surfaces ---- */
        .card {
            background: var(--c-surface);
            color: var(--c-text);
            border: 1px solid var(--c-border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1rem;
        }

        /* ---- Buttons (accent, 10%) ---- */
        button, .btn {
            background: var(--c-accent);
            color: var(--c-text-on-accent);
            border: 1px solid var(--c-accent);
            padding: 0.6rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s, border-color 0.2s;
        }

        button:hover, .btn:hover {
            background: var(--c-accent-hover);
            border-color: var(--c-accent-hover);
        }

        .btn-secondary {
            background: var(--c-surface);
            color: var(--c-text);
            border: 1px solid var(--c-border);
        }

        .btn-secondary:hover {
            background: var(--c-active-line);
            border-color: var(--c-accent);
            color: var(--c-text);
        }

        /* ---- Form controls ---- */
        input[type="text"], input[type="password"], input[type="file"], textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--c-border);
            border-radius: 4px;
            font-size: 1rem;
            margin-bottom: 1rem;
            background: var(--c-base);
            color: var(--c-text-on-base);
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--c-accent);
        }

        textarea {
            min-height: 200px;
            max-height: 80vh;
            font-family: 'Courier New', monospace;
            resize: vertical;
            overflow-y: auto;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--c-text);
        }

        /* ---- Messages ---- */
        .message {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            border: 1px solid var(--c-border);
        }

        .message.success {
            background: var(--c-ok-bg);
            color: var(--c-ok);
            border-color: var(--c-ok-border);
        }

        .message.error {
            background: var(--c-err-bg);
            color: var(--c-err);
            border-color: var(--c-err-border);
        }

        /* ---- Media grids ---- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .media-item {
            background: var(--c-surface);
            color: var(--c-text);
            border: 1px solid var(--c-border);
            border-radius: var(--radius);
            padding: 1rem;
            box-shadow: var(--shadow);
        }

        .media-item img, .media-item video {
            max-width: 100%;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .code-display {
            background: var(--c-active-line);
            border: 1px solid var(--c-border);
            border-radius: 4px;
            padding: 0.5rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            margin-top: 0.5rem;
            color: var(--c-text);
        }

        /* ---- Rendered markdown ---- */
        .markdown-content {
            line-height: 1.8;
            color: var(--c-text);
        }

        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: var(--c-text);
        }

        .markdown-content a {
            color: var(--c-accent);
        }

        .markdown-content code {
            background: var(--c-active-line);
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .markdown-content pre {
            background: var(--c-active-line);
            border: 1px solid var(--c-border);
            border-radius: 4px;
            padding: 0.75rem;
            overflow-x: auto;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
        }

        .markdown-content blockquote {
            border-left: 3px solid var(--c-accent);
            padding-left: 1rem;
            color: var(--c-muted);
            margin: 1rem 0;
        }

        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        .markdown-content video {
            max-width: 100%;
            border-radius: 4px;
        }

        .split-view {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 968px) {
            .split-view {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            nav ul {
                font-size: 0.9rem;
                gap: 0.75rem;
            }

            .container {
                padding: 0 0.5rem;
            }

            .card {
                padding: 1rem;
            }

            button, .btn {
                padding: 0.5rem 0.75rem;
                font-size: 0.9rem;
            }

            h1, h2, h3 {
                font-size: 1.25rem;
            }
        }

        @media (max-width: 480px) {
            nav h1 {
                font-size: 1.25rem;
            }

            nav ul {
                font-size: 0.85rem;
                gap: 0.5rem;
            }

            button, .btn {
                padding: 0.4rem 0.6rem;
                font-size: 0.85rem;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <h1>{{ notebook_title }}</h1>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/new_page">New Page</a></li>
            <li><a href="/images">Images</a></li>
            <li><a href="/videos">Videos</a></li>
            <li><a href="/drawio">Diagrams</a></li>
            {% if password_protected %}
            <li><a href="/logout">Logout</a></li>
            {% endif %}
            <li class="nav-controls">
                <form class="nav-search" action="/search" method="get" role="search">
                    <input type="search" name="q" id="nav-search-q" placeholder="Search pages…" aria-label="Search pages" value="{% block nav_search_query %}{% endblock %}">
                    <button type="submit" class="btn btn-secondary">Search</button>
                </form>
                <label class="vim-nav-toggle" for="vim-mode-toggle" title="Toggle Vim keybindings in the editor">
                    <input type="checkbox" id="vim-mode-toggle"> Vim
                </label>
                <label for="width-selector">Width:</label>
                <select id="width-selector">
                    <option value="narrow">Narrow</option>
                    <option value="standard">Standard</option>
                    <option value="full">Full</option>
                </select>
            </li>
        </ul>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    {% block extra_scripts %}{% endblock %}
    
    <script>
        // Width selector: persists choice in localStorage and applies it via
        // the --content-width CSS variable on :root.
        (function () {
            var WIDTH_MAP = {
                'narrow': '720px',
                'standard': '1200px',
                'full': 'none'
            };
            function applyWidth(value) {
                var cssValue = WIDTH_MAP[value] || WIDTH_MAP['standard'];
                document.documentElement.style.setProperty('--content-width', cssValue);
            }
            var sel = document.getElementById('width-selector');
            if (sel) {
                var saved = localStorage.getItem('qmd-width') || 'standard';
                sel.value = saved;
                applyWidth(saved);
                sel.addEventListener('change', function () {
                    localStorage.setItem('qmd-width', sel.value);
                    applyWidth(sel.value);
                    document.dispatchEvent(new CustomEvent('qmd:width-change', {detail: sel.value}));
                });
            }
        })();

        // Vim mode toggle (lives in the nav bar). Persisted in localStorage
        // so the choice survives across sessions and pages; the editor page
        // listens for the `qmd:vim-change` event to reconfigure CodeMirror.
        (function () {
            var vimCb = document.getElementById('vim-mode-toggle');
            if (vimCb) {
                vimCb.checked = localStorage.getItem('vimModeEnabled') === 'true';
                vimCb.addEventListener('change', function () {
                    localStorage.setItem('vimModeEnabled', String(vimCb.checked));
                    document.dispatchEvent(new CustomEvent('qmd:vim-change', {detail: vimCb.checked}));
                });
            }
        })();
        {% block scripts %}{% endblock %}
    </script>
</body>
</html>
